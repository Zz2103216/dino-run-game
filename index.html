<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🦖 武装小恐龙跑酷</title>
<style>
  :root { --bg: #1a1a2e; --ground: #2a2a4a; --text: #eee; --accent: #e94560; }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg); color: var(--text); min-height: 100vh;
    display: flex; justify-content: center; align-items: center; flex-direction: column;
    user-select: none; -webkit-user-select: none;
  }
  .game-container { position: relative; text-align: center; }
  h1 { font-size: 32px; margin-bottom: 8px; letter-spacing: 2px; }
  .hint { color: #888; font-size: 13px; margin-bottom: 16px; line-height: 1.6; }
  .hint kbd { background: #333; color: #ffd700; padding: 2px 8px; border-radius: 4px; font-family: monospace; font-size: 12px; border: 1px solid #555; }
  .hint .boss { color: #e94560; }
  canvas { display: block; margin: 0 auto; border: 2px solid var(--ground); border-radius: 8px; }
  .scoreboard {
    display: flex; justify-content: space-between; width: 960px; max-width: 100%;
    margin-bottom: 10px; padding: 0 4px; gap: 12px;
  }
  .scoreboard span { font-size: 15px; font-weight: 700; }
  .scoreboard .best { color: #ffd700; }
  .scoreboard .ammo { color: #ff6b6b; }
  .scoreboard .shield { color: #4fc3f7; }
  .restart-btn {
    margin-top: 16px; padding: 12px 40px; font-size: 18px; font-weight: 700;
    background: linear-gradient(135deg, #e94560, #ff6b6b); color: #fff;
    border: none; border-radius: 50px; cursor: pointer; letter-spacing: 2px;
    transition: all 0.3s; box-shadow: 0 4px 20px rgba(233,69,96,0.4);
  }
  .restart-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 30px rgba(233,69,96,0.6); }
  .restart-btn:active { transform: scale(0.96); }

  /* 广告位 */
  .ad-container { display: flex; justify-content: center; align-items: center; margin: 0 auto; overflow: hidden; }
  .ad-banner-top { width: 728px; max-width: 100%; height: 90px; background: rgba(255,255,255,0.03); border: 1px dashed rgba(255,255,255,0.15); border-radius: 8px; margin-bottom: 10px; }
  .ad-banner-bottom { width: 728px; max-width: 100%; height: 90px; background: rgba(255,255,255,0.03); border: 1px dashed rgba(255,255,255,0.15); border-radius: 8px; margin-top: 12px; }
  .ad-placeholder { display: flex; align-items: center; justify-content: center; color: #555; font-size: 12px; height: 100%; letter-spacing: 1px; }
  .ad-banner-mobile { display: none; width: 320px; max-width: 100%; height: 50px; background: rgba(255,255,255,0.03); border: 1px dashed rgba(255,255,255,0.15); border-radius: 8px; margin: 8px auto; }
  @media (max-width: 1000px) { .ad-banner-top, .ad-banner-bottom { display: none; } .ad-banner-mobile { display: flex; } }

  /* 响应式缩放 */
  @media (max-width: 1000px) {
    canvas { width: 100%; height: auto; }
    .scoreboard { width: 100%; flex-wrap: wrap; justify-content: center; }
  }
</style>
</head>
<body>
<div class="game-container">
  <h1>🦖🔫 武装小恐龙跑酷</h1>
  <div class="hint" id="hintBar">
    <kbd>空格</kbd>/<kbd>↑</kbd> 跳跃  <kbd>A</kbd>/<kbd>D</kbd> BOSS战走位  <kbd>鼠标</kbd>瞄准  <kbd>J</kbd>/<kbd>点击</kbd> 射击  <kbd>↓</kbd> 匍匐<br>
    <span class="boss">⚠ 每50分触发BOSS战 ⚠ 🦅击杀+1护盾（挡弹幕） ⚠ 📦地面拾取弹药</span>
  </div>

  <!-- 顶部横幅广告 -->
  <div class="ad-container ad-banner-top" id="adTop">
    <div class="ad-placeholder">📢 广告位 — 替换为 AdSense 代码</div>
  </div>

  <div class="scoreboard" id="scoreboard">
    <span>🏆 分数: <span id="score">0</span></span>
    <span class="best">👑 最高: <span id="best">0</span></span>
    <span class="ammo">🔫 弹药: <span id="ammo">3</span></span>
    <span class="shield">🛡️ 护盾: <span id="hp">0</span></span>
    <span>🦅 击杀: <span id="kills">0</span></span>
    <span class="remote-score" id="remoteScoreSpan" style="display:none">👤 <span id="remoteName">对手</span>: <span id="remoteScore">0</span></span>
    <span class="room-code-display" id="roomCodeDisplayInGame" style="display:none">🏠 房间 <b id="roomCodeGame">----</b></span>
  </div>
  <canvas id="game" width="960" height="400"></canvas>

  <!-- 移动端横幅广告 -->
  <div class="ad-container ad-banner-mobile" id="adMobile">
    <div class="ad-placeholder">📢 广告位</div>
  </div>

  <!-- 底部横幅广告 -->
  <div class="ad-container ad-banner-bottom" id="adBottom">
    <div class="ad-placeholder">📢 广告位 — 替换为 AdSense 代码</div>
  </div>

  <button class="restart-btn" id="restartBtn" onclick="restartGame()" style="display:none">🔄 返回主菜单</button>
</div>

<!-- 联机大厅 -->
<div class="lobby-overlay" id="lobbyOverlay">
  <div class="lobby-panel" id="lobbyPanel">
    <!-- 主面板 -->
    <div id="lobbyMain">
      <h3>🌐 联机对战</h3>
      <div class="sub">与其他玩家实时对战</div>
      <button class="lobby-btn create" onclick="showCreatePanel()">🏠 创建房间</button>
      <button class="lobby-btn join" onclick="showJoinPanel()">🚪 加入房间</button>
      <button class="lobby-btn cancel" onclick="closeLobby()">↩ 返回</button>
    </div>
    <!-- 创建房间面板 -->
    <div id="lobbyCreate" style="display:none">
      <h3>🏠 等待对手加入...</h3>
      <div class="room-code" id="roomCodeDisplay">----</div>
      <div class="sub">把房间号发给朋友</div>
      <div class="lobby-status" id="lobbyWaitStatus">等待中...</div>
      <button class="lobby-btn cancel" onclick="cancelRoom()">取消</button>
    </div>
    <!-- 加入房间面板 -->
    <div id="lobbyJoin" style="display:none">
      <h3>🚪 输入房间号</h3>
      <input type="text" class="lobby-input" id="joinCodeInput" placeholder="0000" maxlength="4" inputmode="numeric" pattern="[0-9]*">
      <div class="lobby-error" id="joinError"></div>
      <button class="lobby-btn join" onclick="joinRoom()">加入</button>
      <button class="lobby-btn cancel" onclick="showMainPanel()">返回</button>
    </div>
  </div>
</div>

<script src="https://cdn.socket.io/4.7.4/socket.io.min.js"></script>
<script>
/* ================================================
   广告配置 — 接入 Google AdSense 后替换下方占位
   ================================================ */

  enabled: false,          // 改为 true 启用广告

const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const W = canvas.width, H = canvas.height;

// ========== 状态机 ==========
// 'menu' → 'tutorial' → 'countdown' → 'playing' → 'gameover'
let gameState = 'menu';
let gameOver = false, score = 0, kills = 0;
let bestScore = parseInt(localStorage.getItem('dinoBest') || '0');

// ========== 联机模式 ==========
// 10种小恐龙颜色
const DINO_COLORS = [
  { name: '赤红', body: '#d32f2f', bodyDark: '#b71c1c' },
  { name: '橙橘', body: '#e65100', bodyDark: '#bf360c' },
  { name: '金黄', body: '#f9a825', bodyDark: '#f57f17' },
  { name: '翠绿', body: '#388e3c', bodyDark: '#1b5e20' },
  { name: '天蓝', body: '#1976d2', bodyDark: '#0d47a1' },
  { name: '深紫', body: '#7b1fa2', bodyDark: '#4a148c' },
  { name: '墨黑', body: '#424242', bodyDark: '#212121' },
  { name: '银白', body: '#9e9e9e', bodyDark: '#616161' },
  { name: '粉红', body: '#e91e63', bodyDark: '#880e4f' },
  { name: '棕褐', body: '#6d4c41', bodyDark: '#3e2723' },
];
let dinoColorIdx = 0, playerName = '', isHost = false;

let multiplayerMode = false, socket = null, roomCode = '';
let remotePlayer = null;

// 颜色选择器
function buildColorPicker(containerId, defaultIdx) {
  const container = document.getElementById(containerId);
  if (!container) return;
  container.innerHTML = '';
  DINO_COLORS.forEach((c, i) => {
    const dot = document.createElement('div');
    dot.className = 'color-dot' + (i === defaultIdx ? ' selected' : '');
    dot.style.backgroundColor = c.body;
    dot.style.color = c.body;
    dot.title = c.name;
    dot.onclick = () => {
      container.querySelectorAll('.color-dot').forEach(d => d.classList.remove('selected'));
      dot.classList.add('selected');
      dinoColorIdx = i;
    };
    container.appendChild(dot);
  });
}

function renderPlayerList(players, containerId, showTag) {
  const container = document.getElementById(containerId);
  if (!container) return;
  let html = '';
  players.forEach((p, i) => {
    const color = DINO_COLORS[p.colorIdx !== undefined ? p.colorIdx : 0];
    html += '<div class="player-item">';
    html += '<div class="dot" style="background:' + color.body + '"></div>';
    html += '<div class="name">' + (p.name || '玩家' + (i+1)) + '</div>';
    if (showTag && p.isHost) html += '<div class="tag">房主</div>';
    html += '</div>';
  });
  container.innerHTML = html || '<div class="sub" style="text-align:center">等待对手加入...</div>';
}

function updateStartButton(players) {
  const btn = document.getElementById('startGameBtn');
  if (!btn) return;
  const hasTwo = players && players.length >= 2;
  btn.disabled = !hasTwo;
  btn.textContent = hasTwo ? '🚀 开始游戏' : '等待对手加入...';
}

function initSocket() {
  if (socket) return;
  socket = io();
  socket.on('connect', () => {});
  socket.on('room-created', (data) => {
    roomCode = data.code;
    document.getElementById('roomCodeDisplay').textContent = roomCode;
    renderPlayerList(data.players || [], 'createPlayerList', true);
    updateStartButton(data.players || []);
  });
  socket.on('room-updated', (data) => {
    const players = data.players || [];
    if (isHost) { renderPlayerList(players, 'createPlayerList', true); updateStartButton(players); }
    else { renderPlayerList(players, 'waitPlayerList', true); }
  });
  socket.on('join-error', (msg) => { document.getElementById('joinError').textContent = msg; });
  socket.on('room-joined', (data) => {
    roomCode = data.code; isHost = false;
    document.getElementById('lobbyJoin').style.display = 'none';
    document.getElementById('lobbyWaiting').style.display = '';
    document.getElementById('waitRoomCode').textContent = roomCode;
    socket.emit('player-info', { name: playerName, colorIdx: dinoColorIdx });
  });
  socket.on('game-start', (data) => {
    multiplayerMode = true;
    document.getElementById('lobbyOverlay').classList.remove('show');
    const opp = data.players.find(p => p.id !== socket.id);
    if (opp) { if (!remotePlayer) remotePlayer = {}; remotePlayer.name = opp.name; remotePlayer.colorIdx = opp.colorIdx; }
    resetGame(); gameState = 'countdown'; countdownValue = 3; countdownStartFrame = frameCount;
    canvas.style.cursor = 'none';
    document.getElementById('scoreboard').style.display = '';
    document.getElementById('hintBar').style.display = '';
    document.getElementById('restartBtn').style.display = 'none';
  });
  socket.on('remote-update', (data) => { if (!remotePlayer) remotePlayer = {}; Object.assign(remotePlayer, data); });
  socket.on('remote-score', (data) => { if (!remotePlayer) remotePlayer = {}; remotePlayer.score = data.score; remotePlayer.kills = data.kills; });
  socket.on('remote-shoot', () => { if (!remotePlayer) remotePlayer = {}; remotePlayer.muzzleFlash = 1; });
  socket.on('remote-died', (data) => { if (!remotePlayer) remotePlayer = {}; remotePlayer.alive = false; remotePlayer.score = data.score; remotePlayer.kills = data.kills; });
  socket.on('opponent-left', () => { if (gameState === 'playing' && !gameOver) { multiplayerMode = false; remotePlayer = null; } });
}

function showCreatePanel() {
  document.getElementById('lobbyMain').style.display = 'none';
  document.getElementById('lobbyCreate').style.display = '';
  document.getElementById('lobbyJoin').style.display = 'none';
  document.getElementById('lobbyWaiting').style.display = 'none';
  dinoColorIdx = 0; isHost = true;
  buildColorPicker('createColorPicker', 0);
  socket.emit('create-room');
}

function showJoinPanel() {
  document.getElementById('lobbyMain').style.display = 'none';
  document.getElementById('lobbyJoin').style.display = '';
  document.getElementById('lobbyCreate').style.display = 'none';
  document.getElementById('lobbyWaiting').style.display = 'none';
  document.getElementById('joinError').textContent = '';
  document.getElementById('joinCodeInput').value = '';
  document.getElementById('joinNameInput').value = '';
  dinoColorIdx = 0; isHost = false;
  buildColorPicker('joinColorPicker', 0);
  document.getElementById('joinCodeInput').focus();
}

function showMainPanel() {
  document.getElementById('lobbyMain').style.display = '';
  document.getElementById('lobbyCreate').style.display = 'none';
  document.getElementById('lobbyJoin').style.display = 'none';
  document.getElementById('lobbyWaiting').style.display = 'none';
}

function joinRoom() {
  const code = document.getElementById('joinCodeInput').value.trim();
  const name = document.getElementById('joinNameInput').value.trim();
  if (code.length !== 4 || !/^\d{4}$/.test(code)) { document.getElementById('joinError').textContent = '请输入4位数字房间号'; return; }
  if (!name) { document.getElementById('joinError').textContent = '请输入你的名称'; return; }
  playerName = name;
  initSocket();
  socket.emit('join-room', { code, name, colorIdx: dinoColorIdx });
}

function closeLobby() {
  if (socket) { socket.disconnect(); socket = null; }
  document.getElementById('lobbyOverlay').classList.remove('show');
  multiplayerMode = false; showMainPanel();
}

function showLobby() {
  document.getElementById('lobbyOverlay').classList.add('show');
  showMainPanel();
  initSocket(); // 预连接，加速后续操作
}

function requestStartGame() {
  if (!isHost || !socket) return;
  const name = document.getElementById('createNameInput').value.trim();
  if (!name) { alert('请输入你的名称'); return; }
  playerName = name;
  socket.emit('player-info', { name, colorIdx: dinoColorIdx });
  socket.emit('request-start');
}

function cancelRoom() {
  showMainPanel();
  if (socket) { socket.disconnect(); socket = null; }
  roomCode = ''; isHost = false;
}

function sendPlayerState() {
  if (!multiplayerMode || !socket || !socket.connected) return;
  if (frameCount % 3 !== 0) return;
  socket.emit('player-update', { x: dino.x, y: dino.y, crouching: dino.crouching, jumping: dino.jumping, legFrame: dino.legFrame, muzzleFlash: dino.muzzleFlash });
  socket.emit('player-score', { score, kills });
}
function sendPlayerShoot() { if (!multiplayerMode || !socket || !socket.connected) return; socket.emit('player-shoot', {}); }
function sendPlayerDied() { if (!multiplayerMode || !socket || !socket.connected) return; socket.emit('player-died', { score, kills }); }
function sendBossKill() { if (!multiplayerMode || !socket || !socket.connected) return; socket.emit('player-boss-kill', {}); }

let speed = 6, frameCount = 0, menuFrame = 0;
const GROUND_Y = H - 60;
const GRAVITY = 0.8, JUMP_FORCE = -14, DOUBLE_JUMP_FORCE = Math.round(JUMP_FORCE / Math.SQRT2);

// 倒计时
let countdownValue = 0, countdownStartFrame = 0;

// 鼠标
let mouseX = 480, mouseY = 200;

// 恐龙
const dino = {
  x: 80, y: GROUND_Y, w: 44, h: 48, vy: 0, vx: 0,
  jumping: false, crouching: false, legFrame: 0, muzzleFlash: 0,
  returning: false, doubleJumped: false,
};

// 弹药 & 护盾
const START_AMMO = 3;
let ammo = START_AMMO, hp = 0;
let invincible = false, invincibleTimer = 0;
const INVINCIBLE_DURATION = 60;

// 子弹 & 弹药拾取物
let bullets = [], ammoPickups = [];

// 障碍物 & BOSS
let obstacles = [], bossActive = false, boss = null, bossLevel = 0;
let nextBossScore = 50, bossProjectiles = [];

// 粒子 & 云
let particles = [], clouds = [], menuParticles = [];

function initClouds() {
  clouds = [];
  for (let i = 0; i < 4; i++) {
    clouds.push({ x: 100 + Math.random() * 700, y: 40 + Math.random() * 80, w: 60 + Math.random() * 50, speed: 1 + Math.random() * 2 });
  }
}

function initMenuParticles() {
  menuParticles = [];
  for (let i = 0; i < 50; i++) {
    menuParticles.push({ x: Math.random() * W, y: Math.random() * H,
      vx: (Math.random() - 0.5) * 0.8, vy: -0.3 - Math.random() * 0.8,
      size: 1 + Math.random() * 3, alpha: 0.2 + Math.random() * 0.4,
      color: ['#e94560','#ffd700','#4fc3f7','#fff'][Math.floor(Math.random()*4)] });
  }
}

function resetGame() {
  gameOver = false; score = 0; kills = 0; speed = 6; frameCount = 0;
  dino.x = 80; dino.y = GROUND_Y; dino.vy = 0; dino.vx = 0; dino.jumping = false; dino.crouching = false; dino.returning = false; dino.doubleJumped = false;
  dino.legFrame = 0; dino.muzzleFlash = 0;
  ammo = START_AMMO; hp = 0; invincible = false; invincibleTimer = 0;
  obstacles = []; bullets = []; particles = []; ammoPickups = [];
  bossActive = false; boss = null; bossLevel = 0; nextBossScore = 50; bossProjectiles = [];
  document.getElementById('score').textContent = '0';
  document.getElementById('kills').textContent = '0';
  document.getElementById('best').textContent = bestScore;
  document.getElementById('ammo').textContent = ammo;
  document.getElementById('hp').textContent = hp;
}

function startGame() {
  resetGame();
  gameState = 'tutorial';
  document.getElementById('restartBtn').style.display = 'none';
  document.getElementById('hintBar').style.display = 'none';
  document.getElementById('scoreboard').style.display = '';
}

// ========== 主菜单 ==========
function drawMenu() {
  menuFrame++;
  const bgGrad = ctx.createLinearGradient(0, 0, 0, H);
  bgGrad.addColorStop(0, '#0d0d2b'); bgGrad.addColorStop(0.5, '#1a1a3e'); bgGrad.addColorStop(1, '#0f1629');
  ctx.fillStyle = bgGrad; ctx.fillRect(0, 0, W, H);

  for (const p of menuParticles) {
    p.x += p.vx; p.y += p.vy;
    if (p.y < -10) { p.y = H + 10; p.x = Math.random() * W; }
    if (p.x < -10) p.x = W + 10;
    if (p.x > W + 10) p.x = -10;
    ctx.globalAlpha = p.alpha + Math.sin(menuFrame * 0.03 + p.x) * 0.15;
    ctx.fillStyle = p.color;
    ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2); ctx.fill();
  }
  ctx.globalAlpha = 1;

  ctx.fillStyle = '#1a1a3e'; ctx.fillRect(0, GROUND_Y, W, H - GROUND_Y);
  ctx.fillStyle = '#2a2a5a'; ctx.fillRect(0, GROUND_Y, W, 2);
  ctx.fillStyle = '#111133';
  ctx.beginPath(); ctx.moveTo(0, GROUND_Y);
  for (let i = 0; i <= W; i += 60) ctx.lineTo(i, GROUND_Y - 20 - Math.abs(Math.sin(i * 0.008)) * 30);
  ctx.lineTo(W, GROUND_Y); ctx.fill();

  const menuDinoX = 520 + Math.sin(menuFrame * 0.02) * 40;
  ctx.save(); ctx.translate(menuDinoX, GROUND_Y - 48);
  const bc = '#3a3a6a';
  ctx.fillStyle = bc; ctx.fillRect(8,4,28,24); ctx.fillRect(30,0,10,16); ctx.fillRect(12,0,20,8);
  ctx.fillStyle = '#fff'; ctx.fillRect(32,4,6,6);
  ctx.fillStyle = '#000'; ctx.fillRect(35,6,3,4);
  ctx.fillStyle = bc; ctx.fillRect(31,2,8,3); ctx.fillRect(38,12,6,4);
  ctx.fillRect(0,10,10,6); ctx.fillRect(0,14,6,4);
  const leg = Math.floor(menuFrame/20)%2;
  if(leg===0){ctx.fillRect(12,44,10,6);ctx.fillRect(26,42,10,6);}
  else{ctx.fillRect(10,42,10,6);ctx.fillRect(26,44,10,6);}
  ctx.restore();

  const titleY = 80;
  ctx.fillStyle = 'rgba(233,69,96,0.15)';
  ctx.font = 'bold 52px sans-serif'; ctx.textAlign = 'center';
  ctx.fillText('🦖🔫 武装小恐龙跑酷', W/2+2, titleY+48);

  const tg = ctx.createLinearGradient(W/2-240, titleY, W/2+240, titleY);
  tg.addColorStop(0,'#e94560'); tg.addColorStop(0.5,'#ff6b6b'); tg.addColorStop(1,'#ffd700');
  ctx.fillStyle = tg;
  ctx.font = 'bold 48px sans-serif';
  ctx.fillText('🦖🔫 武装小恐龙跑酷', W/2, titleY+46);
  ctx.fillStyle = '#888'; ctx.font = '16px sans-serif';
  ctx.fillText('DINO COMMANDO · 像素风跑酷射击', W/2, titleY+82);

  // 双按钮：单人游戏 + 双人游戏（图标卡片式）
  const cardW = 180, cardH = 140, gap = 30;
  const card1X = W/2 - cardW - gap/2, card2X = W/2 + gap/2, cardY = 145;
  const hov1 = mouseX>card1X && mouseX<card1X+cardW && mouseY>cardY && mouseY<cardY+cardH;
  const hov2 = mouseX>card2X && mouseX<card2X+cardW && mouseY>cardY && mouseY<cardY+cardH;
  const pulse = 1 + Math.sin(menuFrame*0.05)*0.03;

  function drawCard(cx, cy, w, h, icon, title, hovered, gradStart, gradEnd) {
    const s = hovered ? 1.04 : 1;
    ctx.save(); ctx.translate(cx + w/2, cy + h/2); ctx.scale(s, s); ctx.translate(-w/2, -h/2);
    // shadow
    ctx.fillStyle = 'rgba(0,0,0,0.3)';
    ctx.beginPath(); roundRect(4, 4, w, h, 16); ctx.fill();
    // card bg
    const g = ctx.createLinearGradient(0, 0, 0, h);
    g.addColorStop(0, hovered ? gradEnd : gradStart);
    g.addColorStop(1, hovered ? gradStart : gradEnd);
    ctx.fillStyle = g;
    ctx.beginPath(); roundRect(0, 0, w, h, 16); ctx.fill();
    ctx.strokeStyle = hovered ? 'rgba(255,255,255,0.5)' : 'rgba(255,255,255,0.2)';
    ctx.lineWidth = 2;
    ctx.beginPath(); roundRect(0, 0, w, h, 16); ctx.stroke(); ctx.lineWidth = 1;
    // icon
    ctx.fillStyle = '#fff'; ctx.font = `bold ${Math.round(36*pulse)}px sans-serif`; ctx.textAlign = 'center';
    ctx.fillText(icon, w/2, 52);
    // title
    ctx.font = `bold ${Math.round(18)}px sans-serif`;
    ctx.fillText(title, w/2, 90);
    // subtitle
    ctx.fillStyle = hovered ? 'rgba(255,255,255,0.7)' : 'rgba(255,255,255,0.4)';
    ctx.font = '12px sans-serif';
    ctx.fillText(hovered ? (title==='单人游戏'?'经典跑酷射击':'好友实时对战') : '', w/2, 112);
    ctx.restore();
  }

  drawCard(card1X, cardY, cardW, cardH, '🦖', '单人游戏', hov1, '#e94560', '#c0392b');
  drawCard(card2X, cardY, cardW, cardH, '🌐', '双人游戏', hov2, '#1976d2', '#0d47a1');

  ctx.fillStyle = '#ffd700'; ctx.font = 'bold 20px sans-serif'; ctx.textAlign = 'center';
  ctx.fillText(`👑 最高分: ${bestScore}`, W/2, cardY+cardH+38);
  if(bestScore>0){ctx.fillStyle='#888';ctx.font='14px sans-serif';ctx.fillText('打破你的记录吧！',W/2,cardY+cardH+60);}

  const gy = cardY+cardH+78;
  ctx.fillStyle = 'rgba(255,255,255,0.08)';
  ctx.beginPath(); roundRect(W/2-320,gy-8,640,90,14); ctx.fill();
  ctx.fillStyle = '#aaa'; ctx.font = '13px sans-serif';
  const guides = [
    '🕹️  空格/↑ 跳跃    鼠标移动 瞄准    J/鼠标点击 射击    ↓ 匍匐躲避',
    '🦅  击杀老鹰 +1护盾（抵挡BOSS弹幕）    📦  地面拾取弹药箱（无上限）',
    '🐉  每 50 分触发 BOSS 战，弹幕难度逐级递增！',
  ];
  guides.forEach((g,i)=>{ctx.fillText(g,W/2,gy+18+i*22);});

  ctx.fillStyle = '#fff'; ctx.font = '18px sans-serif';
  ctx.fillText('👆', mouseX+16, mouseY+8);
}

function roundRect(x,y,w,h,r){
  ctx.moveTo(x+r,y); ctx.lineTo(x+w-r,y); ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r); ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h); ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r); ctx.quadraticCurveTo(x,y,x+r,y);
}

function roundRectPath(x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x+r,y); ctx.lineTo(x+w-r,y); ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r); ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h); ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r); ctx.quadraticCurveTo(x,y,x+r,y);
  ctx.closePath();

// ========== 倒计时 ==========
function drawCountdown() {
  // 正常游戏画面
  ctx.fillStyle = '#fff'; ctx.fillRect(0, 0, W, H);
  ctx.fillStyle = '#e8e8e8';
  ctx.beginPath(); ctx.moveTo(0, GROUND_Y);
  for (let i = 0; i <= W; i += 40) ctx.lineTo(i, GROUND_Y - 20 - Math.sin(i * 0.01 + frameCount * 0.002) * 15);
  ctx.lineTo(W, GROUND_Y); ctx.fill();
  for (const cloud of clouds) drawCloud(cloud);
  ctx.fillStyle = '#c8c8c8'; ctx.fillRect(0, GROUND_Y, W, 3);
  ctx.fillStyle = '#aaa';
  for (let i = 0; i < W; i += 20) { ctx.fillRect(i, GROUND_Y + 8, 6, 2); ctx.fillRect(i + 10, GROUND_Y + 16, 6, 2); }
  drawDino();

  // 倒计时数字
  ctx.fillStyle = 'rgba(0,0,0,0.3)'; ctx.fillRect(0, 0, W, H);
  const num = countdownValue;
  const scale = 1 + (frameCount - countdownStartFrame) % 60 / 60 * 0.3;
  ctx.fillStyle = num <= 1 ? '#e94560' : '#ffd700';
  ctx.font = `bold ${Math.round(80*scale)}px sans-serif`; ctx.textAlign = 'center';
  if (num > 0) ctx.fillText(num, W/2, H/2 + 10);

  if (num <= 0) {
    ctx.fillStyle = '#4caf50'; ctx.font = 'bold 40px sans-serif';
    ctx.fillText('GO!', W/2, H/2 + 10);
  }
}

function drawDino() {
  const { x, y, w, h, legFrame, muzzleFlash, crouching } = dino;

    ctx.fillStyle = '#fff'; ctx.fillRect(34,ch-22,4,4);

    ctx.translate(x, y-h);
    ctx.fillStyle = bodyColor; ctx.fillRect(8,4,28,24); ctx.fillRect(30,0,10,16); ctx.fillRect(12,0,20,8);
    ctx.fillStyle = '#fff'; ctx.fillRect(32,4,6,6);
    ctx.fillStyle = '#000'; ctx.fillRect(35,6,3,4);
    ctx.fillStyle = bodyColor; ctx.fillRect(31,2,8,3);
    ctx.fillRect(38,12,6,4); ctx.fillStyle = '#fff'; ctx.fillRect(42,14,2,2);
    ctx.save(); ctx.translate(40,19); ctx.rotate(aimAngle);
    ctx.fillStyle = '#333'; ctx.fillRect(-2,-2,6,4); ctx.fillRect(-4,-3,12,3);
    ctx.fillStyle = '#555'; ctx.fillRect(6,-3,3,3);
    if(muzzleFlash>0){
      ctx.fillStyle=`rgba(255,200,50,${muzzleFlash})`;ctx.fillRect(8,-3,8,6);
      ctx.fillStyle=`rgba(255,255,200,${muzzleFlash*0.7})`;ctx.fillRect(10,-4,5,8);
    }
    ctx.restore();
    ctx.fillStyle = bodyColor; ctx.fillRect(0,10,10,6); ctx.fillRect(0,14,6,4);
    if(!dino.jumping){if(legFrame===0){ctx.fillRect(12,h-4,10,6);ctx.fillRect(26,h-6,10,6);}

    ctx.fillStyle = '#3d5a3d'; ctx.fillRect(18,8,8,3);
  }
  ctx.restore();
}

  ctx.fillStyle=bc;ctx.beginPath();ctx.arc(b.w*0.35,-b.h*0.15,b.w*0.18,0,Math.PI*2);ctx.fill();

  ctx.beginPath();ctx.moveTo(b.w*0.5,-b.h*0.25);ctx.lineTo(b.w*0.55,-b.h*0.45);ctx.lineTo(b.w*0.52,-b.h*0.22);ctx.fill();
  ctx.fillStyle='#ff0';ctx.beginPath();ctx.arc(b.w*0.4,-b.h*0.2,5,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#000';ctx.beginPath();ctx.arc(b.w*0.41,-b.h*0.2,2,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#e94560';ctx.beginPath();ctx.moveTo(b.w*0.5,-b.h*0.12);ctx.lineTo(b.w*0.65,-b.h*0.08);ctx.lineTo(b.w*0.5,-b.h*0.02);ctx.fill();
  if(b.mouthOpen){ctx.fillStyle=`rgba(255,100,0,${0.5+Math.sin(frameCount*0.3)*0.3})`;ctx.beginPath();ctx.arc(b.w*0.62,-b.h*0.06,8,0,Math.PI*2);ctx.fill();}
  ctx.beginPath();ctx.moveTo(-b.w*0.3,0);ctx.quadraticCurveTo(-b.w*0.6,b.h*0.3,-b.w*0.5,b.h*0.1);
  ctx.lineWidth=8;ctx.strokeStyle=bc;ctx.stroke();ctx.lineWidth=1;
  ctx.fillStyle='#555';ctx.fillRect(b.w*0.2,b.h*0.15,10,4);ctx.fillRect(b.w*0.22,b.h*0.15,3,8);ctx.fillRect(b.w*0.27,b.h*0.15,3,8);
  ctx.restore();
}
function drawCloud(cloud){
  ctx.fillStyle='rgba(200,200,200,0.6)';const{x,y,w}=cloud,h=w*0.4;
  ctx.beginPath();ctx.ellipse(x,y,w/2,h/2,0,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.ellipse(x-w*0.2,y+h*0.1,w*0.3,h*0.35,0,0,Math.PI*2);ctx.fill();

function spawnParticles(x,y,count,colors){
  for(let i=0;i<count;i++)particles.push({x,y,vx:(Math.random()-0.5)*8,vy:-Math.random()*10-2,
    life:1,decay:0.015+Math.random()*0.04,size:2+Math.random()*4,color:colors[Math.floor(Math.random()*colors.length)]});
}
function rectsOverlap(a,b){return a.x<b.x+b.w&&a.x+a.w>b.x&&a.y<b.y+b.h&&a.y+a.h>b.y;}

// ========== BOSS ==========
let pickupSpawnTimer = 0;
function spawnAmmoPickup(){ammoPickups.push({x:W+40,y:GROUND_Y-14,w:20,h:20,floatOffset:Math.random()*Math.PI*2});}
function triggerBoss(){
  bossActive=true;bossLevel++;
  const bhp=4+bossLevel*2;
  boss={x:W+60,y:80+Math.random()*60,w:80,h:60,hp:bhp,maxHp:bhp,
    state:'entering',targetX:W-200,targetY:80+Math.random()*100,vy:0,
    wingUp:false,flashTimer:0,mouthOpen:false,
    shootTimer:Math.max(20,70-bossLevel*8),shootCooldown:0,moveTimer:0};
  obstacles=[];
}
function bossShoot(){
  const b=boss;if(!b)return;b.shootCooldown=b.shootTimer;b.mouthOpen=true;
  const lv=bossLevel,patterns=[0];if(lv>=1)patterns.push(1);if(lv>=2)patterns.push(2);if(lv>=3)patterns.push(3);
  const pat=patterns[Math.floor(Math.random()*patterns.length)];
  const bx=boss.x+boss.w*0.5,by=boss.y-boss.h*0.1;
  switch(pat){
    case 0:{const a=Math.atan2(dino.y-dino.h/2-by,dino.x-bx),s=3+lv*0.5;
      bossProjectiles.push({x:bx,y:by,vx:Math.cos(a)*s,vy:Math.sin(a)*s,isEnemy:true,r:4+lv*0.5,angle:a});break;}
    case 1:{const base=Math.atan2(dino.y-dino.h/2-by,dino.x-bx),s=2.5+lv*0.4;
      for(let a=-0.3;a<=0.3;a+=0.3){const ang=base+a;
        bossProjectiles.push({x:bx,y:by,vx:Math.cos(ang)*s,vy:Math.sin(ang)*s,isEnemy:true,r:3+lv*0.3,angle:ang});}break;}
    case 2:{const base=Math.atan2(dino.y-dino.h/2-by,dino.x-bx),s=2+lv*0.3;
      for(let a=-0.6;a<=0.6;a+=0.3){const ang=base+a;
        bossProjectiles.push({x:bx,y:by,vx:Math.cos(ang)*s,vy:Math.sin(ang)*s,isEnemy:true,r:3,angle:ang});}break;}
    case 3:{for(let side=-1;side<=1;side+=2){const s=2.5+lv*0.3,a=Math.PI+side*(0.5+lv*0.1);
        bossProjectiles.push({x:bx+side*20,y:by,vx:Math.cos(a)*s,vy:Math.sin(a)*s,isEnemy:true,r:3,angle:a});}
      const aim=Math.atan2(dino.y-dino.h/2-by,dino.x-bx);
      bossProjectiles.push({x:bx,y:by,vx:Math.cos(aim)*3.5,vy:Math.sin(aim)*3.5,isEnemy:true,r:4,angle:aim});break;}
  }
}
function updateBoss(){
  if(!bossActive||!boss)return;const b=boss;
  if(b.flashTimer>0)b.flashTimer--;if(b.mouthOpen&&frameCount%5===0)b.mouthOpen=false;
  if(frameCount%15===0)b.wingUp=!b.wingUp;
  if(b.state==='entering'){b.x+=(b.targetX-b.x)*0.03;b.y+=(b.targetY-b.y)*0.03;
    if(Math.abs(b.x-b.targetX)<2&&Math.abs(b.y-b.targetY)<2){b.x=b.targetX;b.y=b.targetY;b.state='fighting';b.shootCooldown=40;}}
  else if(b.state==='fighting'){b.moveTimer++;b.y=b.targetY+Math.sin(b.moveTimer*0.02)*30;b.shootCooldown--;if(b.shootCooldown<=0)bossShoot();
    const hb=getDinoHitbox();
    for(let j=bossProjectiles.length-1;j>=0;j--){const bp=bossProjectiles[j],pr=bp.r||3;
      const cx=Math.max(hb.x,Math.min(bp.x,hb.x+hb.w)),cy=Math.max(hb.y,Math.min(bp.y,hb.y+hb.h));
      if((bp.x-cx)**2+(bp.y-cy)**2<pr*pr){bossProjectiles.splice(j,1);if(invincible)continue;
        if(hp>0){hp--;invincible=true;invincibleTimer=INVINCIBLE_DURATION;
          document.getElementById('hp').textContent=hp;spawnParticles(dino.x+dino.w/2,dino.y-dino.h/2,6,['#4fc3f7','#fff']);}
        else{endGame();return;}}}}
  else if(b.state==='dying'){b.y+=2;if(b.y>GROUND_Y+50){b.state='dead';bossActive=false;boss=null;nextBossScore=score+50;bossProjectiles=[];dino.returning=true;}}
}
function updateBossProjectiles(){
  for(let i=bossProjectiles.length-1;i>=0;i--){const bp=bossProjectiles[i];bp.x+=bp.vx;bp.y+=bp.vy;
    if(bp.x<-20||bp.x>W+20||bp.y<-20||bp.y>GROUND_Y+20)bossProjectiles.splice(i,1);}
}
function bossHit(){
  if(!boss||boss.state!=='fighting')return;boss.hp--;boss.flashTimer=8;spawnParticles(boss.x,boss.y,8,['#ff0','#f80','#fff']);
  if(boss.hp<=0){boss.state='dying';boss.flashTimer=0;
    spawnParticles(boss.x,boss.y,40,['#ff0','#f80','#f00','#fff','#ffd700']);score+=10;document.getElementById('score').textContent=score;bossProjectiles=[];
    if(multiplayerMode) sendBossKill();}
}
function spawnObstacle(){
  if(bossActive||gameState!=='playing')return;
  const minGap=Math.max(90,200-score*1.5);
  if(obstacles.length>0&&obstacles[obstacles.length-1].x>W-minGap)return;
  const roll=Math.random(), eagleChance=Math.min(0.3,0.06+score*0.0025), aerialChance=Math.min(0.25,0.05+score*0.002);
  if(roll<eagleChance)obstacles.push({x:W+Math.random()*80,y:-30-Math.random()*30,w:40+Math.random()*20,h:28,
    type:'eagle',wingUp:false,targetY:GROUND_Y-dino.h-20+Math.random()*40,vx:-(speed+1+Math.random()*2),vy:1.5+Math.random()*2});
  else if(roll<eagleChance+aerialChance){
    if(Math.random()<0.5)obstacles.push({x:W,y:GROUND_Y-44,ow:80+Math.random()*40,oh:16,type:'barbwire'});
    else obstacles.push({x:W,y:GROUND_Y-46,ow:70+Math.random()*50,oh:20,type:'beam'});
  }
  else{const oh=30+Math.random()*30;obstacles.push({x:W,y:GROUND_Y,w:20+Math.random()*10,h:oh,type:'cactus'});}
}
function shoot(){
  if(gameState!=='playing'||gameOver||ammo<=0)return;
  ammo--;document.getElementById('ammo').textContent=ammo;dino.muzzleFlash=1;
  if(multiplayerMode) sendPlayerShoot();
  const bx=dino.x+46,by=dino.y-(dino.crouching?dino.h*0.55:dino.h)+16;
  const angle=Math.atan2(mouseY-by,mouseX-bx),spd=10;
  bullets.push({x:bx,y:by,vx:Math.cos(angle)*spd,vy:Math.sin(angle)*spd,angle,isEnemy:false});
}
function jump(){
  if(gameOver||dino.crouching)return;
  if(gameState!=='playing'&&gameState!=='tutorial')return;
  if(!dino.jumping){dino.vy=JUMP_FORCE;dino.jumping=true;dino.doubleJumped=false;}
  else if(dino.jumping&&!dino.doubleJumped){dino.vy=DOUBLE_JUMP_FORCE;dino.doubleJumped=true;}
}
function endGame(){
  gameOver=true;gameState='gameover';
  spawnParticles(dino.x+dino.w/2,dino.y-dino.h/2,30,['#e94560','#ffd700','#fff','#ff4444']);
  if(!multiplayerMode) updateBestScore();
  if(multiplayerMode){ sendPlayerDied(); }
  document.getElementById('restartBtn').style.display='';
  document.getElementById('restartBtn').textContent='🔄 返回主菜单';
  canvas.style.cursor='default';
}
function updateBestScore(){if(score>bestScore){bestScore=score;localStorage.setItem('dinoBest',bestScore);document.getElementById('best').textContent=bestScore;}}

// ========== 主更新 ==========
function update(){
  if(gameState==='tutorial'){
    // 教学期间：恐龙可操作但无威胁，不生成障碍物
    frameCount++;
    if(!dino.crouching&&frameCount%8===0&&!dino.jumping)dino.legFrame=(dino.legFrame+1)%2;
    if(dino.muzzleFlash>0){dino.muzzleFlash-=0.15;if(dino.muzzleFlash<0)dino.muzzleFlash=0;}
    dino.vy+=GRAVITY;dino.y+=dino.vy;
    if(dino.y>=GROUND_Y){dino.y=GROUND_Y;dino.vy=0;dino.jumping=false;dino.doubleJumped=false;}
    // 云仍然移动
    for(const cloud of clouds){cloud.x-=cloud.speed;if(cloud.x<-80){cloud.x=W+50;cloud.y=30+Math.random()*80;}}
    // 清除可能残留的子弹
    for(let i=bullets.length-1;i>=0;i--){bullets[i].x+=bullets[i].vx;bullets[i].y+=bullets[i].vy;
      if(bullets[i].x>W+20||bullets[i].y<0||bullets[i].y>H)bullets.splice(i,1);}
    return;
  }

  if(gameState==='countdown'){
    frameCount++;
    if(!dino.crouching&&frameCount%8===0&&!dino.jumping)dino.legFrame=(dino.legFrame+1)%2;
    if(dino.muzzleFlash>0){dino.muzzleFlash-=0.15;if(dino.muzzleFlash<0)dino.muzzleFlash=0;}
    dino.vy+=GRAVITY;dino.y+=dino.vy;
    if(dino.y>=GROUND_Y){dino.y=GROUND_Y;dino.vy=0;dino.jumping=false;dino.doubleJumped=false;}
    for(const cloud of clouds){cloud.x-=cloud.speed;if(cloud.x<-80){cloud.x=W+50;cloud.y=30+Math.random()*80;}}
    // 倒计时逻辑
    const elapsed = frameCount - countdownStartFrame;
    if(elapsed >= 60) { countdownValue--; countdownStartFrame = frameCount; }
    if(countdownValue <= 0 && elapsed >= 60) {
      gameState = 'playing';
      document.getElementById('hintBar').style.display = '';
      canvas.style.cursor = 'none';
    }
    return;
  }

  if(gameState!=='playing'||gameOver)return;
  frameCount++;
  if(invincible){invincibleTimer--;if(invincibleTimer<=0)invincible=false;}
  if(!dino.crouching&&frameCount%8===0&&!dino.jumping)dino.legFrame=(dino.legFrame+1)%2;
  if(dino.muzzleFlash>0){dino.muzzleFlash-=0.15;if(dino.muzzleFlash<0)dino.muzzleFlash=0;}
  dino.vy+=GRAVITY;dino.y+=dino.vy;
  if(dino.y>=GROUND_Y){dino.y=GROUND_Y;dino.vy=0;dino.jumping=false;dino.doubleJumped=false;}

  // BOSS战期间允许前后移动
  if(bossActive&&boss&&boss.state==="fighting"){
    const moveSpd=3.5;
    if(keysDown["KeyA"]||keysDown["ArrowLeft"])dino.vx=-moveSpd;
    else if(keysDown["KeyD"]||keysDown["ArrowRight"])dino.vx=moveSpd;
    else dino.vx*=0.8;
    dino.x+=dino.vx;
    dino.x=Math.max(20,Math.min(W-120,dino.x));
  }else if(dino.returning){
    dino.x+=(80-dino.x)*0.08;
    if(Math.abs(dino.x-80)<0.5){dino.x=80;dino.returning=false;}
  }
  if(frameCount%200===0)speed+=0.3;
  if(!bossActive&&score>=nextBossScore&&!gameOver)triggerBoss();
  if(!bossActive&&frameCount%Math.max(40,90-score*0.5)===0)spawnObstacle();
  if(!bossActive){pickupSpawnTimer++;
    if(pickupSpawnTimer>=250+Math.random()*150&&ammoPickups.length<3){pickupSpawnTimer=0;spawnAmmoPickup();}}
  for(const cloud of clouds){cloud.x-=cloud.speed;if(cloud.x<-80){cloud.x=W+50;cloud.y=30+Math.random()*80;}}
  for(let i=bullets.length-1;i>=0;i--){bullets[i].x+=bullets[i].vx;bullets[i].y+=bullets[i].vy;
    if(bullets[i].x<-20||bullets[i].x>W+20||bullets[i].y<-20||bullets[i].y>H+20){bullets.splice(i,1);continue;}
    if(bossActive&&boss&&boss.state==='fighting'&&bullets[i]&&
      bullets[i].x>boss.x-boss.w*0.4&&bullets[i].x<boss.x+boss.w*0.4&&
      bullets[i].y>boss.y-boss.h*0.35&&bullets[i].y<boss.y+boss.h*0.25){bullets.splice(i,1);bossHit();}}
  for(let i=ammoPickups.length-1;i>=0;i--){const pk=ammoPickups[i];pk.x-=speed*0.7;
    if(pk.x<-30){ammoPickups.splice(i,1);continue;}
    if(rectsOverlap(getDinoHitbox(),{x:pk.x-10,y:pk.y-12,w:20,h:24})){ammoPickups.splice(i,1);ammo++;
      document.getElementById('ammo').textContent=ammo;spawnParticles(pk.x,pk.y,6,['#ffd700','#fff']);}}
  if(!bossActive)for(let i=obstacles.length-1;i>=0;i--){const obs=obstacles[i];
    if(obs.type==='eagle'){obs.x+=obs.vx;obs.y+=obs.vy;if(frameCount%12===0)obs.wingUp=!obs.wingUp;
      if(obs.y>=obs.targetY){obs.y=obs.targetY;obs.vy=0;}if(obs.x+obs.w<-30){obstacles.splice(i,1);continue;}
      if(rectsOverlap(getDinoHitbox(),{x:obs.x+8,y:obs.y+5,w:obs.w-16,h:obs.h-10})){if(invincible){obstacles.splice(i,1);continue;}endGame();return;}
      for(let j=bullets.length-1;j>=0;j--)if(bullets[j].x>obs.x+5&&bullets[j].x<obs.x+obs.w-5&&
        bullets[j].y>obs.y+5&&bullets[j].y<obs.y+obs.h-5){bullets.splice(j,1);obstacles.splice(i,1);
        spawnParticles(obs.x+obs.w/2,obs.y+obs.h/2,15,['#e8a020','#fff','#ff4444','#4a3728','#4fc3f7']);
        kills++;hp++;score+=2;document.getElementById('kills').textContent=kills;
        document.getElementById('hp').textContent=hp;document.getElementById('score').textContent=score;break;}}
    else if(obs.type==='barbwire'||obs.type==='beam'){
      obs.x-=speed;if(obs.x+obs.ow<-20){obstacles.splice(i,1);continue;}
      if(!dino.crouching){
        const hb=getDinoHitbox(),obsBottom=obs.y+obs.oh;
        if(hb.y<obsBottom&&hb.x<obs.x+obs.ow&&hb.x+hb.w>obs.x){if(invincible){obstacles.splice(i,1);continue;}endGame();return;}
      }
    }
    else{obs.x-=speed;if(obs.x+obs.w<-20){obstacles.splice(i,1);continue;}
      if(rectsOverlap(getDinoHitbox(),{x:obs.x+6,y:obs.y-obs.h+4,w:obs.w-12,h:obs.h-8})){if(invincible){obstacles.splice(i,1);continue;}endGame();return;}}}
  updateBoss();updateBossProjectiles();if(gameOver)return;
  for(let i=particles.length-1;i>=0;i--){const p=particles[i];p.x+=p.vx;p.y+=p.vy;p.vy+=0.3;p.life-=p.decay;if(p.life<=0)particles.splice(i,1);}
  for(const obs of obstacles){if((obs.type==='cactus'||obs.type==='barbwire'||obs.type==='beam')&&obs.x+(obs.ow||obs.w)<dino.x&&!obs.passed){obs.passed=true;score++;document.getElementById('score').textContent=score;}}
  if(multiplayerMode) sendPlayerState();
}

// ========== 主绘制 ==========
function draw(){
  if(gameState==='menu'){drawMenu();return;}
  if(gameState==='tutorial'){drawTutorial();return;}
  if(gameState==='countdown'){drawCountdown();return;}

  ctx.fillStyle=bossActive?'#faf0e6':'#fff';ctx.fillRect(0,0,W,H);
  if(bossActive&&frameCount%20<10){ctx.strokeStyle='rgba(233,69,96,0.4)';ctx.lineWidth=4;ctx.strokeRect(2,2,W-4,H-4);ctx.lineWidth=1;}
  ctx.fillStyle=bossActive?'#e8d8c8':'#e8e8e8';ctx.beginPath();ctx.moveTo(0,GROUND_Y);
  for(let i=0;i<=W;i+=40)ctx.lineTo(i,GROUND_Y-20-Math.sin(i*0.01+frameCount*0.002)*15);
  ctx.lineTo(W,GROUND_Y);ctx.fill();
  ctx.globalAlpha=bossActive?0.3:1;for(const cloud of clouds)drawCloud(cloud);ctx.globalAlpha=1;
  ctx.fillStyle='#c8c8c8';ctx.fillRect(0,GROUND_Y,W,3);
  ctx.fillStyle='#aaa';for(let i=0;i<W;i+=20){ctx.fillRect(i,GROUND_Y+8,6,2);ctx.fillRect(i+10,GROUND_Y+16,6,2);}

    else if(obs.type==='beam')drawBeam(Math.round(obs.x),Math.round(obs.y),obs.ow,obs.oh);

  }

  for(const p of particles){ctx.globalAlpha=p.life;ctx.fillStyle=p.color;ctx.fillRect(p.x-p.size/2,p.y-p.size/2,p.size,p.size);}ctx.globalAlpha=1;
  if(gameState==='playing')drawCrosshair();
  // 联机：更新对手分数和房间号显示
  if(multiplayerMode&&remotePlayer){
    const rss=document.getElementById('remoteScoreSpan');

    document.getElementById('remoteName').textContent=remotePlayer.name||'对手';

  } else {

  }
  if(multiplayerMode&&roomCode){
    const rcd=document.getElementById('roomCodeDisplayInGame');
    rcd.style.display='';
    document.getElementById('roomCodeGame').textContent=roomCode;
  } else {
    document.getElementById('roomCodeDisplayInGame').style.display='none';
  }
  if(bossActive&&boss&&(boss.state==='entering'||boss.state==='fighting')){const barW=240,barH=14,barX=W/2-barW/2,barY=10;
    ctx.fillStyle='rgba(0,0,0,0.5)';ctx.fillRect(barX-2,barY-2,barW+4,barH+4);ctx.fillStyle='#333';ctx.fillRect(barX,barY,barW,barH);
    const hpR=boss.hp/boss.maxHp;ctx.fillStyle=hpR>0.5?'#4caf50':hpR>0.25?'#ff9800':'#f44336';ctx.fillRect(barX,barY,barW*hpR,barH);
    ctx.fillStyle='#fff';ctx.font='bold 12px sans-serif';ctx.textAlign='center';ctx.fillText(`🐉 BOSS Lv.${bossLevel} [${boss.hp}/${boss.maxHp}]`,W/2,barY+11);}
  if(bossActive&&boss&&boss.state==='entering'){ctx.fillStyle='rgba(233,69,96,0.9)';ctx.font='bold 28px sans-serif';ctx.textAlign='center';ctx.fillText('⚠ BOSS 来袭！',W/2,H/2+50);}
  if(invincible&&gameState==='playing'){ctx.fillStyle='rgba(79,195,247,0.6)';ctx.font='bold 14px sans-serif';ctx.textAlign='center';
    ctx.fillText('🛡️ 无敌',dino.x+dino.w/2,dino.y-(dino.crouching?dino.h*0.55:dino.h)-12);}
  if(gameState==='gameover'){ctx.fillStyle='rgba(0,0,0,0.5)';ctx.fillRect(0,0,W,H);
    ctx.fillStyle='#2d2d2d';ctx.font='bold 40px sans-serif';ctx.textAlign='center';
    if(multiplayerMode){
      const rp = remotePlayer||{};
      const oppName = rp.name || '对手';
      const opponentAlive = rp.alive !== false;
      const opponentScore = rp.score || 0;
      if(opponentAlive){
        ctx.fillText('😵 你输了！',W/2,H/2-15);
        ctx.font='17px sans-serif';ctx.fillStyle='#aaa';
        ctx.fillText(`${oppName} 仍在奔跑... 对方分数: ${opponentScore}`,W/2,H/2+15);
      }else if(score > opponentScore){
        ctx.fillText('🏆 你赢了！',W/2,H/2-15);
      }else if(score < opponentScore){
        ctx.fillText('😵 你输了！',W/2,H/2-15);
      }else{
        ctx.fillText('🤝 平局！',W/2,H/2-15);
      }
      ctx.font='17px sans-serif';ctx.fillStyle='#999';
      ctx.fillText(`你: ${score}分 ${kills}杀  |  ${oppName}: ${opponentScore}分 ${rp.kills||0}杀`,W/2,H/2+25);
    }else{
      ctx.fillText('💥 GAME OVER',W/2,H/2-15);
      ctx.font='17px sans-serif';ctx.fillStyle='#999';
      ctx.fillText(`击杀 ${kills} 只老鹰 · 击败 ${bossLevel} 个BOSS · 护盾 ${hp} · 得分 ${score}`,W/2,H/2+25);
    }
    ctx.fillText('点击下方按钮返回主菜单',W/2,H/2+55);
    ctx.fillStyle='rgba(255,255,255,0.6)';ctx.font='12px sans-serif';ctx.fillText('--- 赞助商广告 ---',W/2,H/2+85);
    ctx.fillStyle='rgba(255,255,255,0.15)';ctx.fillRect(W/2-180,H/2+92,360,45);
    ctx.fillStyle='#555';ctx.font='11px sans-serif';ctx.fillText('📢 广告位 — 接入 AdSense 后自动展示',W/2,H/2+118);}
}

// ========== 游戏循环 ==========
function gameLoop(){update();draw();requestAnimationFrame(gameLoop);}

// ========== 教学关闭 ==========
function closeTutorial(){
  gameState='countdown';
  countdownValue=3;
  countdownStartFrame=frameCount;
  obstacles=[];ammoPickups=[];bullets=[];bossProjectiles=[];
}

// ========== 输入 ==========
const keysDown={};
document.addEventListener('keydown',(e)=>{
  if(gameState==='menu')return;
  keysDown[e.code]=true;
  if(document.getElementById('lobbyJoin').style.display!=='none'&&e.code==='Enter'){e.preventDefault();joinRoom();return;}
  if(e.code==='Space'||e.code==='ArrowUp'||e.code==='KeyW'){e.preventDefault();jump();}
  else if(e.code==='KeyJ'||e.code==='Enter'){e.preventDefault();if(gameState==='tutorial'||gameState==='playing')shoot();}
  if(e.code==="KeyA"||e.code==="ArrowLeft"||e.code==="KeyD"||e.code==="ArrowRight"){e.preventDefault();}
  else if(e.code==='ArrowDown'||e.code==='KeyS'){e.preventDefault();if(!dino.jumping&&dino.y>=GROUND_Y)dino.crouching=true;}
});
document.addEventListener('keyup',(e)=>{keysDown[e.code]=false;if(e.code==='ArrowDown'||e.code==='KeyS')dino.crouching=false;});

canvas.addEventListener('mousemove',(e)=>{
  const r=canvas.getBoundingClientRect();
  mouseX=(e.clientX-r.left)*(W/r.width);mouseY=(e.clientY-r.top)*(H/r.height);
});
canvas.addEventListener('click',(e)=>{
  const r=canvas.getBoundingClientRect();
  mouseX=(e.clientX-r.left)*(W/r.width);mouseY=(e.clientY-r.top)*(H/r.height);
  if(gameState==='menu'){
    const cardW=180,cardH=140,gap=30,card1X=W/2-cardW-gap/2,card2X=W/2+gap/2,cardY=145;
    if(mouseX>card1X&&mouseX<card1X+cardW&&mouseY>cardY&&mouseY<cardY+cardH)startGame();
    else if(mouseX>card2X&&mouseX<card2X+cardW&&mouseY>cardY&&mouseY<cardY+cardH)showLobby();
  }else if(gameState==='tutorial'){
    const cbx=W/2-90,cby=370-50,cbw=180,cbh=36;
    if(mouseX>cbx&&mouseX<cbx+cbw&&mouseY>cby&&mouseY<cby+cbh)closeTutorial();
  }else if(gameState==='playing'){shoot();}
});
canvas.addEventListener('mouseenter',()=>{if(gameState==='playing')canvas.style.cursor='none';});
canvas.addEventListener('mouseleave',()=>{canvas.style.cursor='default';});

canvas.addEventListener('touchstart',(e)=>{
  e.preventDefault();const r=canvas.getBoundingClientRect();
  const sx=W/r.width,sy=H/r.height;
  mouseX=(e.touches[0].clientX-r.left)*sx;mouseY=(e.touches[0].clientY-r.top)*sy;
  if(gameState==='menu'){const cardW=180,cardH=140,gap=30,card1X=W/2-cardW-gap/2,card2X=W/2+gap/2,cardY=145;
    if(mouseX>card1X&&mouseX<card1X+cardW&&mouseY>cardY&&mouseY<cardY+cardH)startGame();
    else if(mouseX>card2X&&mouseX<card2X+cardW&&mouseY>cardY&&mouseY<cardY+cardH)showLobby();}
  else if(gameState==='tutorial'){const cbx=W/2-90,cby=370-50,cbw=180,cbh=36;
    if(mouseX>cbx&&mouseX<cbx+cbw&&mouseY>cby&&mouseY<cby+cbh)closeTutorial();}
  else if(gameState==='playing'){if(mouseY<H*0.4)jump();else if(mouseY>H*0.65)shoot();
    else if(dino.y>=GROUND_Y&&!dino.jumping)dino.crouching=true;}
});
canvas.addEventListener('touchend',()=>{dino.crouching=false;});

function restartGame(){
  if(multiplayerMode&&socket){socket.disconnect();socket=null;}
  gameState='menu';multiplayerMode=false;remotePlayer=null;
  document.getElementById('hintBar').style.display='';
  document.getElementById('scoreboard').style.display='';
  document.getElementById('remoteScoreSpan').style.display='none';
}

// ========== 启动 ==========
initMenuParticles();initClouds();gameLoop();
</script>
</body>
